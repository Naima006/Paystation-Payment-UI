<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayStation Payment Gateway</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="payment-container" id="paymentWindow">
        
        <div class="payment-header">
            <span class="back-arrow">&#x25C0;</span>
            <span class="header-title">Payment</span>
            <span class="close-cross">&#x2716;</span>
        </div>

        <div class="business-box">
            <div class="business-logo">
                <img src="image.png" alt="">
            </div>
            <div class="business-details">
                <h3>PAYSTATION</h3>
                <p>Invoice: 46866430</p>
            </div>
        </div>

        <div class="dashed-divider"></div>

        <div class="tabs-group">
            <div class="tab-item active" id="cardTab">Card</div>
            <div class="tab-item" id="mfsTab">Mobile Banking</div>
        </div>
        
        <div class="selection-container" id="cardSelectionBox">
            <div class="card-selection">
                <div class="card-option active" id="masterBtn">
                    <img src="Mastercard-logo.png" alt="Mastercard">
                </div>
                <div class="card-option" id="visaBtn">
                    <img src="Visacard-logo.png" alt="Visa">
                </div>
            </div>
        </div>

        <div class="selection-container hidden" id="mfsSelectionBox">
            <div class="card-selection">
                <div class="card-option active" id="bkashBtn">
                    <img src="Bkash-logo.png" alt="Bkash">
                </div>
                <div class="card-option" id="nagadBtn">
                    <img src="Nagad-logo.png" alt="Nagad">
                </div>
            </div>
        </div>

        <form id="paymentForm">
            <div class="form-fields-box">
                <div id="cardFields">
                    <div class="form-group">
                        <input type="text" id="cardNumber" placeholder="Card Number" maxlength="16" pattern="[0-9]{16}" inputmode="numeric" required>
                    </div>

                    <div class="form-inline-group">
                        <input type="text" id="expMonth" placeholder="MM" maxlength="2" pattern="[0-9]{2}" inputmode="numeric" required>
                        <input type="text" id="expYear" placeholder="YY" maxlength="2" pattern="[0-9]{2}" inputmode="numeric" required>
                        <input type="password" id="cvv" placeholder="CVV" maxlength="3" pattern="[0-9]{3}" inputmode="numeric" required>
                    </div>

                    <div class="form-group">
                        <input type="text" id="cardName" placeholder="Card Holder Name" required>
                    </div>
                </div>

                <div id="mfsFields" class="hidden">
                    <div class="form-group">
                        <label class="input-label">Enter your account number</label>
                        <input type="text" id="mfsAccountNumber" placeholder="e.g. 01xxxxxxx" maxlength="11" pattern="[0-9]{11}" inputmode="numeric">
                    </div>
                </div>

                <div class="form-actions-row">
                    <label class="checkbox-container">
                        <input type="checkbox" id="saveCard">
                        <span class="checkmark"></span>
                        Save for next payment
                    </label>
                    <a href="#" class="terms-link">Terms & Conditions</a>
                </div>
            </div>

            <div class="success-banner hidden" id="successStatus">
                <span class="success-icon">&#x2714;</span>
                <div>
                    <h4>Payment Completed Successfully!</h4>
                    <p>Your transaction of BDT 5,500.00 was processed.</p>
                </div>
            </div>

            <button type="submit" class="btn-pay" id="payButton">Pay BDT 5,500.00</button>
            <button type="reset" class="btn-cancel" onclick="alert('Transaction Cancelled')">Cancel</button>
        </form>

        <div class="payment-footer">
            <p class="terms-text">By clicking Pay, you agree to our <a href="#">Terms and Conditions</a></p>
            <div class="powered-by-row">
                <span class="powered-label">Powered by</span>
                <img src="Paystation-logo.png" alt="Pay" class="footer-logo">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
